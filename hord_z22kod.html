    <p>
        Hordiienko – Programowanie to proces tworzenia oprogramowania komputerowego za pomocą języków programowania.
        Języki takie jak Python, Java, C++ czy JavaScript pozwalają na tworzenie różnorodnych aplikacji – od prostych skryptów po złożone systemy.
        Programista musi rozumieć struktury danych (np. listy, słowniki, stosy, kolejki) oraz mechanizmy sterowania (pętle, instrukcje warunkowe).
        Zazwyczaj programisty dobrze zarabiają, np. pracując w znanych firmach.
    </p>
    <p id="gruby_hordiienko">
        Hordiienko – Sieci komputerowe umożliwiają komunikację pomiędzy urządzeniami.
        Fundamentalne pojęcia w tej dziedzinie to adres IP, protokół TCP/IP, routery i switch’e.
        Sieci lokalne (LAN) pozwalają na wymianę danych w obrębie jednego budynku, natomiast sieci rozległe (WAN), jak Internet, umożliwiają globalny transfer informacji.
        Ważnym zagadnieniem jest również bezpieczeństwo sieci, obejmujące szyfrowanie danych i ochronę przed atakami typu DDoS.
        
    </p>
    <h1 id="dlawszystkich">
        Hordiienko – Sztuczna inteligencja (AI) to dziedzina zajmująca się tworzeniem systemów zdolnych do wykonywania zadań wymagających inteligencji ludzkiej, takich jak rozpoznawanie obrazów czy analiza języka naturalnego.
        Uczenie maszynowe (Machine Learning) to poddziedzina AI, w której komputer uczy się na podstawie danych i poprawia swoje działanie w czasie.
        Modele takie jak sieci neuronowe (Neural Networks) czy drzewa decyzyjne (Decision Trees) znajdują zastosowanie w medycynie, finansach czy automatyce.
        W naszych czasach AI jest częściej używany np. do stworzenia jakiś obrazków lub tekstów.
    </h1>
    <div id="dlawszystkich">
        Koroktov – Bazy danych służą do przechowywania i zarządzania danymi.
        SQL jest językiem używanym do komunikacji z bazami danych.
        Dane mogą być przechowywane w tabelach i powiązane relacjami.
        Najpopularniejszą aplikacja SZBD jest Microsoft Access.
    </div>
